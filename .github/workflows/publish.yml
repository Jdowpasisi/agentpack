name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  # Guard: tag must come from a release/* branch
  check-release-branch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify tag is on a release branch
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Find branches that contain this tag's commit
          BRANCHES=$(git branch -r --contains "refs/tags/${TAG}" 2>/dev/null || true)
          echo "Branches containing tag ${TAG}:"
          echo "${BRANCHES}"
          if ! echo "${BRANCHES}" | grep -qE 'origin/release/'; then
            echo "ERROR: Tag ${TAG} must be created from a release/* branch."
            echo "Create a branch named release/<version>, merge it via PR, then tag from there."
            exit 1
          fi

  # Guard: CHANGELOG.md must have an entry for this version
  check-changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify CHANGELOG entry exists
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Strip leading 'v' to get version string (e.g. v0.1.11 → 0.1.11)
          VERSION="${TAG#v}"
          if ! grep -qF "## [${VERSION}]" CHANGELOG.md 2>/dev/null && \
             ! grep -qF "## ${VERSION}" CHANGELOG.md 2>/dev/null; then
            echo "ERROR: No entry found for version ${VERSION} in CHANGELOG.md."
            echo "Add a '## [${VERSION}]' section before tagging."
            exit 1
          fi
          echo "CHANGELOG entry for ${VERSION} found."

  test:
    needs: [check-release-branch, check-changelog]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: pytest tests/ -v --cov --cov-report=term-missing
      - name: Lint
        run: ruff check src/ tests/

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/agentpack-cli
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
