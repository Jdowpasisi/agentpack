name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Guard: tag must come from a release/* branch
  check-release-branch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - name: Verify tag is on a release branch
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Find branches that contain this tag's commit
          BRANCHES=$(git branch -r --contains "refs/tags/${TAG}" 2>/dev/null || true)
          echo "Branches containing tag ${TAG}:"
          echo "${BRANCHES}"
          if ! echo "${BRANCHES}" | grep -qE 'origin/release/'; then
            echo "ERROR: Tag ${TAG} must be created from a release/* branch."
            echo "Create a branch named release/<version>, merge it via PR, then tag from there."
            exit 1
          fi

  # Guard: CHANGELOG.md must have an entry for this version
  check-changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Verify CHANGELOG entry exists
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Strip leading 'v' to get version string (e.g. v0.1.11 → 0.1.11)
          VERSION="${TAG#v}"
          if ! grep -qF "## [${VERSION}]" CHANGELOG.md 2>/dev/null && \
             ! grep -qF "## ${VERSION}" CHANGELOG.md 2>/dev/null; then
            echo "ERROR: No entry found for version ${VERSION} in CHANGELOG.md."
            echo "Add a '## [${VERSION}]' section before tagging."
            exit 1
          fi
          echo "CHANGELOG entry for ${VERSION} found."

  # Guard: pyproject.toml, __init__.py, and npm/package.json must agree on version
  check-version-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Verify pyproject.toml and __init__.py versions match
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PYPROJECT=$(python3 -c "import tomllib; d=tomllib.loads(open('pyproject.toml').read()); print(d['project']['version'])" 2>/dev/null || python3 -c "import re; m=re.search(r'version\s*=\s*\"([^\"]+)\"', open('pyproject.toml').read()); print(m.group(1))")
          INIT=$(python3 -c "import re; m=re.search(r'__version__\s*=\s*\"([^\"]+)\"', open('src/agentpack/__init__.py').read()); print(m.group(1))")
          NPM=$(python3 -c "import json; print(json.load(open('npm/package.json'))['version'])")
          echo "tag:            $TAG_VERSION"
          echo "pyproject.toml: $PYPROJECT"
          echo "__init__.py:    $INIT"
          echo "npm/package.json: $NPM"
          if [ "$TAG_VERSION" != "$PYPROJECT" ]; then
            echo "ERROR: version mismatch — tag=$TAG_VERSION pyproject.toml=$PYPROJECT"
            exit 1
          fi
          if [ "$PYPROJECT" != "$INIT" ]; then
            echo "ERROR: version mismatch — pyproject.toml=$PYPROJECT __init__.py=$INIT"
            exit 1
          fi
          if [ "$PYPROJECT" != "$NPM" ]; then
            echo "ERROR: version mismatch — pyproject.toml=$PYPROJECT npm/package.json=$NPM"
            exit 1
          fi
          echo "Versions in sync: $PYPROJECT"

  check-pypi-version-available:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Verify PyPI version is not already published
        run: |
          python3 - <<'PY'
          import sys
          import tomllib
          import urllib.error
          import urllib.parse
          import urllib.request

          with open("pyproject.toml", "rb") as fh:
              project = tomllib.load(fh)["project"]
          name = project["name"]
          version = project["version"]
          url = f"https://pypi.org/pypi/{urllib.parse.quote(name, safe='')}/{urllib.parse.quote(version, safe='')}/json"
          try:
              urllib.request.urlopen(urllib.request.Request(url, headers={"Accept": "application/json"}), timeout=8).close()
          except urllib.error.HTTPError as exc:
              if exc.code == 404:
                  print(f"{name}=={version} is available on PyPI.")
                  sys.exit(0)
              raise
          print(f"ERROR: {name}=={version} already exists on PyPI.")
          sys.exit(1)
          PY

  test:
    needs: [check-release-branch, check-changelog, check-version-sync, check-pypi-version-available]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: pytest tests/ -v --cov --cov-report=term-missing -m "not slow"
      - name: Lint
        run: ruff check src/ tests/

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dist
          path: dist/

  publish:
    needs: [build, verify-built-wheel]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/agentpack-cli
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b

  verify-built-wheel:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: dist
          path: dist/
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
      - name: Install built wheel
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install dist/*.whl
          .venv/bin/agentpack --version
      - name: Verify all agent integrations from wheel
        run: |
          .venv/bin/python - <<'PY'
          import json
          import subprocess
          import tempfile
          from pathlib import Path

          base = Path(tempfile.mkdtemp(prefix="agentpack-wheel-matrix-"))
          bin_path = Path.cwd() / ".venv" / "bin" / "agentpack"
          expect = {
              "claude": ["CLAUDE.md", ".claude/settings.json", ".mcp.json"],
              "cursor": [".cursorrules", ".cursor/rules/agentpack.mdc", ".vscode/tasks.json"],
              "windsurf": [".windsurfrules", ".vscode/tasks.json"],
              "codex": ["AGENTS.md", ".codex/hooks.json"],
              "antigravity": ["GEMINI.md", ".vscode/tasks.json"],
              "generic": [],
          }
          git_agents = {"cursor", "windsurf", "codex", "antigravity"}

          def check(root, agent):
              missing = [rel for rel in expect[agent] if not (root / rel).exists()]
              if missing:
                  raise SystemExit(f"{agent}: missing {missing}")
              if agent == "claude":
                  text = json.dumps(json.loads((root / ".claude/settings.json").read_text()))
                  assert text.count("agentpack hook --event SessionStart") == 1, text
                  assert text.count("agentpack hook --event UserPromptSubmit") == 1, text
              if agent == "codex":
                  text = json.dumps(json.loads((root / ".codex/hooks.json").read_text()))
                  assert text.count("agentpack hook --event SessionStart") == 1, text
                  assert text.count("agentpack hook --event UserPromptSubmit") == 1, text
              for event in ("post-commit", "post-merge", "post-checkout"):
                  hook = root / ".git" / "hooks" / event
                  has_marker = hook.exists() and "agentpack:auto-repack" in hook.read_text()
                  if (agent in git_agents) != has_marker:
                      raise SystemExit(f"{agent}: git hook {event} marker mismatch")

          for mode in ("init", "install"):
              for agent in expect:
                  root = base / f"{mode}-{agent}"
                  root.mkdir()
                  subprocess.run(["git", "init", "--quiet"], cwd=root, check=True)
                  cmd = [str(bin_path), mode, "--agent", agent]
                  if mode == "init":
                      cmd.append("--yes")
                  subprocess.run(cmd, cwd=root, check=True)
                  subprocess.run(cmd, cwd=root, check=True)
                  check(root, agent)
                  print(f"{mode}:{agent}: ok")
          PY
