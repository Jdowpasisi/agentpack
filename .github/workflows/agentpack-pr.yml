name: AgentPack context pack

on:
  pull_request:
    types: [opened, synchronize]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install agentpack
        run: pip install -e .

      - name: Generate context pack
        run: |
          mkdir -p .agentpack
          printf '%s\n' "${{ github.event.pull_request.title }}" > .agentpack/task.md
          agentpack init --yes
          agentpack pack --agent claude \
            --task auto \
            --since origin/${{ github.base_ref }} \
            --mode balanced

      - name: Upload context pack
        uses: actions/upload-artifact@v4
        with:
          name: agentpack-context
          path: .agentpack/context.claude.md
          retention-days: 7
