name: AgentPack context pack

on:
  pull_request:
    types: [opened, synchronize]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: Install agentpack
        run: pip install -e .

      - name: Generate context pack
        run: |
          mkdir -p .agentpack
          printf '%s\n' "${{ github.event.pull_request.title }}" > .agentpack/task.md
          agentpack init --yes
          agentpack pack --agent claude \
            --task auto \
            --since origin/${{ github.base_ref }} \
            --mode balanced

      - name: Upload context pack
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: agentpack-context
          path: .agentpack/context.claude.md
          retention-days: 7
