name: Publish to npm

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-release-branch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - name: Verify tag is on a release branch
        run: |
          TAG="${GITHUB_REF_NAME}"
          BRANCHES=$(git branch -r --contains "refs/tags/${TAG}" 2>/dev/null || true)
          echo "Branches containing tag ${TAG}:"
          echo "${BRANCHES}"
          if ! echo "${BRANCHES}" | grep -qE 'origin/release/'; then
            echo "ERROR: Tag ${TAG} must be created from a release/* branch."
            exit 1
          fi

  check-version-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Verify tag, Python package, and npm package versions match
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PYPROJECT=$(python3 -c "import tomllib; d=tomllib.loads(open('pyproject.toml').read()); print(d['project']['version'])" 2>/dev/null || python3 -c "import re; m=re.search(r'version\s*=\s*\"([^\"]+)\"', open('pyproject.toml').read()); print(m.group(1))")
          INIT=$(python3 -c "import re; m=re.search(r'__version__\s*=\s*\"([^\"]+)\"', open('src/agentpack/__init__.py').read()); print(m.group(1))")
          NPM=$(python3 -c "import json; print(json.load(open('npm/package.json'))['version'])")
          echo "tag:              $TAG_VERSION"
          echo "pyproject.toml:   $PYPROJECT"
          echo "__init__.py:      $INIT"
          echo "npm/package.json: $NPM"
          if [ "$TAG_VERSION" != "$PYPROJECT" ] || [ "$PYPROJECT" != "$INIT" ] || [ "$PYPROJECT" != "$NPM" ]; then
            echo "ERROR: release versions are not in sync."
            exit 1
          fi

  publish:
    needs: [check-release-branch, check-version-sync]
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@vishal2612200/agentpack
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Test npm wrapper
        run: npm test
        working-directory: npm
      - name: Dry-run npm package contents
        run: npm pack --dry-run
        working-directory: npm
      - name: Verify npm version is not already published
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/tmp/npm-version.txt 2>/tmp/npm-version.err; then
            echo "ERROR: ${PACKAGE_NAME}@${PACKAGE_VERSION} already exists on npm."
            cat /tmp/npm-version.txt
            exit 1
          fi
          if ! grep -qi "E404\\|404" /tmp/npm-version.err; then
            echo "ERROR: npm registry lookup failed."
            cat /tmp/npm-version.err
            exit 1
          fi
          echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is available on npm."
        working-directory: npm
      - name: Verify npm token is configured
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "ERROR: NPM_TOKEN secret is not configured."
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Verify npm scope access
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          NPM_USER="$(npm whoami)"

          echo "npm user: ${NPM_USER}"
          echo "package: ${PACKAGE_NAME}"

          if [[ "${PACKAGE_NAME}" == @*/* ]]; then
            PACKAGE_SCOPE="${PACKAGE_NAME%%/*}"
            SCOPE_OWNER="${PACKAGE_SCOPE#@}"

            if [ "${SCOPE_OWNER}" != "${NPM_USER}" ]; then
              if ! npm access list packages "${PACKAGE_SCOPE}" >/tmp/npm-scope-access.json 2>/tmp/npm-scope-access.err; then
                echo "::error title=npm scope access failed::NPM_TOKEN is authenticated as '${NPM_USER}', but ${PACKAGE_NAME} publishes under '${PACKAGE_SCOPE}'. Use a token from npm user '${SCOPE_OWNER}', create an npm org named '${SCOPE_OWNER}' and grant publish access, or rename npm/package.json to a scope owned by the token."
                cat /tmp/npm-scope-access.err
                exit 1
              fi
              echo "scope access verified for ${PACKAGE_SCOPE}"
            fi
          fi
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish npm package
        run: npm publish --access public --provenance
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
