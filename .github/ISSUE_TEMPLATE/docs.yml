name: Documentation issue
description: Report stale, missing, or unclear docs.
title: "docs: "
labels:
  - documentation
body:
  - type: input
    id: page
    attributes:
      label: Page or file
      placeholder: docs/commands.md
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: Issue
      description: What is stale, unclear, or missing?
    validations:
      required: true
  - type: textarea
    id: suggested_fix
    attributes:
      label: Suggested fix
      description: Optional wording or structure.
    validations:
      required: false
