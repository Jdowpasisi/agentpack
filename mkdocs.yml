site_name: AgentPack
site_url: https://vishal2612200.github.io/agentpack/
site_description: Local context engine for AI coding agents that ranks relevant repo files and builds compact task-focused context packs.
repo_url: https://github.com/vishal2612200/agentpack
repo_name: vishal2612200/agentpack
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/vishal2612200/agentpack
    - icon: fontawesome/brands/npm
      link: https://www.npmjs.com/package/@vishal2612200/agentpack
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/agentpack-cli/

extra_javascript:
  - assets/seo-schema.js

nav:
  - Home: index.md
  - Start:
      - Commands: commands.md
      - Configuration: configuration.md
      - Integrations: integrations.md
      - How AgentPack works: how-agentpack-works.md
      - AgentPack for AI agents: agentpack-for-ai-agents.md
  - Search-intent guides:
      - AI coding agent context packing: ai-coding-agent-context.md
      - Claude Code context engine: claude-code-context-engine.md
      - MCP context engine: mcp-context-engine.md
      - Cursor context packing: cursor-context-packing.md
      - Reduce Claude Code token usage: reduce-claude-code-token-usage.md
  - Comparisons:
      - AgentPack vs Repomix: agentpack-vs-repomix.md
      - AgentPack vs Augment Context Engine: agentpack-vs-augment-context-engine.md
  - Evidence:
      - Benchmarking: benchmarking.md
      - Benchmark learnings: benchmark-learnings.md
      - Visibility audit: visibility-audit-2026-06-12.md
  - Trust:
      - Privacy: privacy.md
      - Threat model: threat-model.md
      - Data flow: data-flow.md
      - Limitations: limitations.md
  - Development:
      - Architecture: architecture.md
      - Development: development.md
      - Runtime loop: runtime-loop.md
