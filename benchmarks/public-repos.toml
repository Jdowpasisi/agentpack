# Public real-repo benchmark suite for v0.3.20+.
#
# Each explicit case points to a real public commit. Repos may also set
# sample_history = N. AgentPack samples recent first-parent, non-merge commits,
# checks out each commit's parent, uses the commit subject as the task, and
# scores whether it selected the files actually changed by that commit.
#
# Run:
#   agentpack benchmark --public-repos --prove-targets --misses --public-table
#
# Current target size: 8 pinned Pallets smoke cases + 100+ sampled historical
# cases across Python, TypeScript, Go, Java, and monorepo projects.

[[repos]]
name = "pallets-click"
url = "https://github.com/pallets/click.git"
ref = "main"
sample_history = 20
task_type = "python-cli"
mode = "balanced"
budget = 3000
include_globs = ["src/**/*.py", "tests/**/*.py", "pyproject.toml"]
exclude_globs = ["docs/**", "examples/**"]
max_changed_files = 8

