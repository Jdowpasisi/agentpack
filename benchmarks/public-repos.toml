# Public real-repo benchmark suite.
#
# Each case points to a real public commit. AgentPack checks out the commit's
# parent, uses the commit subject as the task, and scores whether it selected
# the files actually changed by that commit.
#
# Run:
#   agentpack benchmark --public-repos --prove-targets --misses --public-table

[[repos]]
name = "pallets-click"
url = "https://github.com/pallets/click.git"
ref = "main"

[[repos.cases]]
commit = "61bdc2ae81f6d0dc19bd247504544659245df056"
task = "Implement a regex-based solution to hide hidden input"
task_type = "python-cli"
mode = "minimal"
budget = 2000
expected_files = [
  "src/click/termui.py",
  "tests/test_termui.py",
]

[[repos.cases]]
commit = "fc6c7c47edd6110b6bd5a1a5297b2035214b0cd1"
task = "FuncParamType should use ValueError message in self.fail"
task_type = "python-cli"
mode = "minimal"
budget = 6000
expected_files = [
  "src/click/types.py",
  "tests/test_types.py",
]

